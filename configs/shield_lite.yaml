# SHIELD-Lite Training Configuration

model:
  name: "AnomalySegmentation"
  in_channels: 3

anomaly_model:
  decoder_dim: 256
  pretrained_backbone_path: "checkpoints/cityscapes/backbone_weights.pth"

# SHIELD-Lite Specific Config
shield_lite:
  # Hazard Scorer
  use_hazard_scorer: true
  hazard_beta: 10.0
  base_threshold: 0.01
  
  # Small Hazard Prior
  use_small_hazard_prior: true
  prior_fusion_mode: "add"  # "add", "concat", "attention"
  
  # Hazard Score Training
  hazard_overlap_threshold: 0.3  # IoU threshold for positive samples
  
  # Candidate Extraction
  candidate_threshold_high: 0.5
  candidate_threshold_small: 0.3
  candidate_tau_small: 500
  candidate_local_response_thresh: 0.6
  max_candidates: 10
  min_candidate_area: 50

dataset:
  data_root: "/data/lyx/mm2026/synthetic_dataset"

anomaly_dataset:
  data_root: "/data/lyx/mm2026/synthetic_dataset"
  img_dir: "synthetic_images"
  mask_dir: "synthetic_masks"
  mask_thresh: 1
  use_flat_dir: true
  train_ratio: 0.9
  seed: 42

train:
  num_epochs: 100
  batch_size: 4
  num_workers: 0
  val_interval: 1
  max_val_batches: 10
  vis_interval: 100  # Visualization interval (batches)
  devices: [4, 5, 6, 7]  # GPU devices

optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.0005

scheduler:
  type: "PolynomialLR"
  power: 0.9

# Loss Configuration
loss:
  name: "AnomalySegmentationTotalLoss"
  bce_weight: 0.5
  dice_weight: 0.5
  lambda_coarse: 0.5    # Coarse loss weight
  lambda_hazard: 0.5    # Hazard loss weight
  
  # Hazard Loss Specific
  hazard_loss_type: "bce"  # "bce", "focal", "softmargin"
  hazard_pos_weight: 1.0
  hazard_neg_weight: 0.5

checkpoint:
  save_dir: "checkpoints/shield_lite"
  save_interval: 5
  log_dir: "logs/shield_lite"
  vis_dir: "visualizations/shield_lite"

# Transforms
transforms:
  train:
    resize: [256, 512]
    random_flip: true
    random_crop: false
    color_jitter: true
  val:
    resize: [256, 512]

device: "cuda:0"

# Ablation Options
# === Example Ablation Configs ===
#
# 1. Baseline (no hazard scorer, no prior):
#   shield_lite:
#     use_hazard_scorer: false
#     use_small_hazard_prior: false
#
# 2. Only Hazard Scorer (no prior):
#   shield_lite:
#     use_hazard_scorer: true
#     use_small_hazard_prior: false
#
# 3. Full SHIELD-Lite:
#   shield_lite:
#     use_hazard_scorer: true
#     use_small_hazard_prior: true
#     prior_fusion_mode: "add"
#
# 4. Attention fusion:
#   shield_lite:
#     prior_fusion_mode: "attention"
#
# 5. Different lambda weights:
#   loss:
#     lambda_coarse: 0.3
#     lambda_hazard: 1.0
